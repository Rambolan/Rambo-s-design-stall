    .nav__menu-item .menu-icon {

      color: #6366f1;
    }

    /* ========== Mobile Hamburger (hidden on PC) ========== */
    .navbar__hamburger {

      align-items: center; justify-content: center; gap: 6px;
      border-radius: 12px; transition: background 0.2s;

      opacity: 0; visibility: hidden;
      transform: translateY(-12px) scale(0.96);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .dropdown-menu.show {

          <h2>前言</h2>
          <p>在当今快速迭代的设计行业中，如何提升设计到开发的交付效率一直是团队追求的目标。随着 AI 技术的快速发展，我们有了更多工具来自动化繁琐的工作流程。本文将探讨如何利用 AI 工具将设计稿自动转换为高质量前端代码，大幅提升设计到开发的交付效率。</p>

          <h2>传统设计到开发流程的痛点</h2>
          <p>在传统的瀑布流开发模式中，设计稿完成后需要经历多个环节才能最终落地：</p>

            <li>开发者根据标注还原设计稿</li>

            <li>修改迭代后重新标注</li>
          </ul>
          <p>这些环节中，设计到开发的转换往往消耗大量时间和精力，而且容易出现沟通误差。</p>

          <p>让我们通过一个实际案例来展示完整的 AI 辅助设计到代码的流程。</p>

          <h2>什么是用户体验设计？</h2>
          <p>用户体验设计（UX Design）是一种以用户为中心的设计方法论，关注用户与产品交互过程中的感受和体验。好的用户体验设计能够让用户在使用产品时感到自然、流畅和愉悦。</p>
          
          <img src="https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=800&h=400&fit=crop" alt="用户体验设计">

          <h2>用户体验设计的五大核心原则</h2>
          
          <h3>1. 可用性优先</h3>
          <p>产品首先必须能够完成用户想要完成的任务。可用性是用户体验的基石，没有可用性，其他一切都是空谈。</p>

          <h3>2. 一致性设计</h3>
          <p>保持界面和交互的一致性，减少用户的学习成本。无论是视觉风格、交互模式还是术语使用，都应该保持统一。</p>

          <blockquote>
            "一致性是用户信任的基础。当产品行为可预测时，用户会感到安心。"
          </blockquote>

          <h3>3. 反馈机制</h3>
          <p>每一次用户操作都应该得到及时的反馈。无论是点击按钮、上传文件还是提交表单，用户都需要知道系统正在响应。</p>

          <h3>4. 容错设计</h3>
          <p>允许用户犯错，并提供简单的恢复方式。好的产品会预判可能的错误，并提供预防或解决方案。</p>

          <h3>5. 简约设计</h3>
          <p>遵循"少即是多"的原则，去除不必要的元素，让用户专注于核心任务。</p>

          <div class="image-grid">
            <img src="https://images.unsplash.com/photo-1507721999472-8ed4421c4af2?w=400&h=300&fit=crop" alt="简约设计">
            <img src="https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=400&h=300&fit=crop" alt="设计系统">
          </div>

          <h2>实践方法</h2>
          <p>将用户体验原则落地到实际项目中，需要遵循以下流程：</p>
          <ol>
            <li>用户研究 - 了解目标用户的需求和痛点</li>
            <li>信息架构 - 组织内容结构，让信息易于理解</li>
            <li>交互设计 - 设计用户与产品的交互方式</li>
            <li>视觉设计 - 用视觉语言传达产品调性</li>
            <li>用户测试 - 验证设计方案的有效性</li>
          </ol>

          <h2>结语</h2>
          <p>用户体验设计不是一次性的工作，而是需要持续迭代和优化。始终以用户为中心，保持同理心，才能设计出真正打动人心的产品。</p>

        content: `
          <h2>为什么需要响应式设计？</h2>
          <p>在多设备时代，用户通过手机、平板、笔记本、桌面显示器等各种设备访问网站。响应式设计让同一个网站能够在不同设备上都呈现出最佳的浏览体验。</p>

          <img src="https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=800&h=400&fit=crop" alt="多设备响应">

          <h2>核心策略</h2>
          
          <h3>移动优先（Mobile First）</h3>
          <p>从最小屏幕开始设计，然后逐步增加样式以适应更大的屏幕。这种方法确保了核心内容在所有设备上都能正常显示。</p>

          <h3>弹性布局（Fluid Grid）</h3>
          <p>使用相对单位（如百分比、vw、vh）替代固定像素值，让布局能够根据视口大小自动调整。</p>

          <h3>媒体查询（Media Queries）</h3>
          <p>通过 CSS 媒体查询针对不同的屏幕尺寸应用不同的样式规则。</p>

          <div class="code-block">
            <code>/* 移动优先的媒体查询示例 */
.container {
  width: 100%;
  padding: 16px;
}

@media (min-width: 768px) {
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px;
  }
}

@media (min-width: 1024px) {
  .container {
    max-width: 960px;
    padding: 48px;
  }
}</code>
          </div>

          <h2>常见布局模式</h2>
          <ul>
            <li><strong>单栏布局</strong> - 适合简单的内容展示</li>
            <li><strong>双栏布局</strong> - 侧边栏 + 主内容区</li>
            <li><strong>三栏布局</strong> - 双侧栏 + 主内容区</li>
            <li><strong>栅格系统</strong> - 灵活的网格划分</li>
          </ul>

          <h2>图片响应式处理</h2>
          <p>图片是响应式设计中容易被忽视的部分。使用 srcset 和 picture 元素可以为不同屏幕提供最适合的图片尺寸。</p>

          <h2>结语</h2>
          <p>响应式设计不是一项独立的技术，而是多种技术的综合应用。掌握好这些核心策略，就能应对各种设备的挑战。</p>
        `

        tags: ['交互设计', '动效', '用户体验'],
        content: `
          <h2>什么是微交互？</h2>
          <p>微交互是指用户在产品中完成的微小任务，它们存在于按钮点击、表单提交、消息发送等各个细节中。好的微交互能够给用户带来愉悦感，让产品更加生动有趣。</p>

          <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800&h=400&fit=crop" alt="微交互设计">

          <h2>7 个微交互设计技巧</h2>

          <h3>1. 按钮反馈</h3>
          <p>按钮是最基本的交互元素。为按钮添加按下状态的动效，让用户感受到操作的确定性。</p>

          <h3>2. 加载状态</h3>
          <p>当操作需要等待时，使用有意义的加载动画。骨架屏（Skeleton Screen）是很好的替代方案。</p>

          <div class="highlight-box">
            <h3>小技巧</h3>
            <p>加载动画最好与当前操作相关联，如发送消息显示"发送中..."，而不是通用的"请等待"。</p>
          </div>

          <h3>3. 成功反馈</h3>
          <p>操作成功后，通过动效或视觉变化告诉用户"成功了"。Toast 提示、按钮变绿、列表项滑入都是常见方式。</p>

          <h3>4. 错误处理</h3>
          <p>错误信息应该清晰、友好，并提供解决方案。避免使用生硬的技术术语。</p>

          <h3>5. 页面转场</h3>
          <p>页面之间的切换不应该突兀。使用平滑的转场动效，让用户了解自己在产品中的位置。</p>

          <h3>6. 列表操作</h3>
          <p>列表项的添加、删除、拖拽等操作，都应该有过渡动画。这帮助用户理解操作的因果关系。</p>

          <h3>7. 空状态设计</h3>
          <p>空状态是展示品牌个性和引导用户的好机会。用插画和引导文案让空状态不再尴尬。</p>

          <h2>动效设计原则</h2>
          <ul>
            <li><strong>快速响应</strong> - 交互反馈应在 100ms 内完成</li>
            <li><strong>自然流畅</strong> - 遵循物理世界的运动规律</li>
            <li><strong>目的明确</strong> - 每个动效都应该有存在的理由</li>
            <li><strong>克制使用</strong> - 过多动效会分散用户注意力</li>
          </ul>

          <blockquote>
            "动效是用户界面的无声语言，它传达状态、引导注意力、创造情感连接。"
          </blockquote>

          <h2>结语</h2>
          <p>微交互虽小，却能大大提升用户体验。花时间打磨这些细节，让你的产品从"能用"变成"好用"，从"好用"变成"爱用"。</p>
