<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品集 - 兰博的设计小摊</title>
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #333;
      background: #f0f2f5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* ========== Top Navigation ========== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    }
    .navbar__logo {
      display: flex; align-items: center; gap: 12px;
      font-weight: 700; font-size: 20px; color: #111;
    }
    .navbar__logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      overflow: hidden;
    }
    .navbar__logo-icon img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .navbar__title {
      font-size: 20px; font-weight: 700; color: #1a1a2e;
      letter-spacing: 0.5px;
    }

    /* ========== PC Nav Menu (Horizontal) ========== */
    .nav__menu {
      display: flex; align-items: center; gap: 8px;
    }
    .nav__menu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 15px; font-weight: 500; color: #555;
      transition: all 0.2s;
      cursor: pointer;
    }
    .nav__menu-item:hover {
      background: #f3f0ff;
      color: #6366f1;
    }
    .nav__menu-item.active {
      background: #f3f0ff;
      color: #6366f1;
    }
    .nav__menu-item .menu-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      color: #6366f1;
    }

    /* ========== Mobile Hamburger (hidden on PC) ========== */
    .navbar__hamburger {
      display: none;
      width: 44px; height: 44px; border: none; background: none;
      cursor: pointer; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      border-radius: 12px; transition: background 0.2s;
    }
    .navbar__hamburger:hover { background: #f0f0f5; }
    .navbar__hamburger span {
      display: block; width: 24px; height: 2.5px;
      background: #333; border-radius: 2px;
      transition: all 0.3s ease;
    }
    .navbar__hamburger.active span:nth-child(1) {
      transform: translateY(8.5px) rotate(45deg);
    }
    .navbar__hamburger.active span:nth-child(2) { opacity: 0; }
    .navbar__hamburger.active span:nth-child(3) {
      transform: translateY(-8.5px) rotate(-45deg);
    }

    /* ========== Dropdown Menu ========== */
    .dropdown-menu {
      position: fixed; top: 68px; right: 40px; z-index: 999;
      width: 240px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
      padding: 10px;
      opacity: 0; visibility: hidden;
      transform: translateY(-12px) scale(0.96);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .dropdown-menu.show {
      opacity: 1; visibility: visible; transform: translateY(0) scale(1);
    }
    .dropdown-menu__item {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 18px;
      border-radius: 12px;
      font-size: 16px; color: #333; font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }
    .dropdown-menu__item:hover { background: #f3f0ff; color: #6366f1; }
    .dropdown-menu__item.active { background: #f3f0ff; color: #6366f1; }
    .dropdown-menu__item .menu-icon {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      color: #6366f1;
    }

    /* ========== Page Header ========== */
    .page-header {
      margin-top: 68px;
      padding: 80px 48px 60px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      text-align: center;
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 15% 75%, rgba(99,102,241,0.18) 0%, transparent 50%),
        radial-gradient(circle at 85% 15%, rgba(168,85,247,0.12) 0%, transparent 50%);
    }
    .page-header__content {
      position: relative; z-index: 1;
      max-width: 800px; margin: 0 auto;
    }
    .page-header__tag {
      display: inline-block;
      padding: 6px 18px; border-radius: 24px;
      background: rgba(99,102,241,0.2); color: #a5b4fc;
      font-size: 14px; font-weight: 700; margin-bottom: 16px;
      letter-spacing: 2px;
    }
    .page-header__title {
      font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 16px;
    }
    .page-header__desc {
      font-size: 17px; color: rgba(255,255,255,0.78); line-height: 1.8;
    }

    /* ========== Portfolio Section ========== */
    .portfolio-section {
      padding: 60px 48px 80px;
      max-width: 1280px; margin: 0 auto;
    }

    /* ========== Filter Bar ========== */
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
      padding: 24px 32px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    .filter-bar__left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .sort-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sort-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      border-radius: 12px;
      font-size: 14px; font-weight: 500; color: #555;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    .sort-btn:hover {
      border-color: #6366f1;
      color: #6366f1;
      background: #f8f7ff;
    }
    .sort-btn.active {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-color: transparent;
      color: #fff;
    }
    .sort-btn.active .sort-icon {
      color: #fff;
    }
    .sort-btn .sort-text {
      white-space: nowrap;
    }
    .sort-arrows {
      display: flex;
      flex-direction: column;
      line-height: 1;
      margin-left: 6px;
    }
    .sort-arrows svg {
      width: 14px; height: 10px;
      color: #bbb;
      transition: color 0.2s;
    }
    .sort-arrows svg.active-arrow {
      color: #555;
    }
    .sort-btn:hover .sort-arrows svg.active-arrow {
      color: #6366f1;
    }
    .sort-btn.active .sort-arrows svg {
      color: rgba(255,255,255,0.45);
    }
    .sort-btn.active .sort-arrows svg.active-arrow {
      color: #fff;
    }
    .sort-divider {
      width: 1px; height: 32px;
      background: #e5e7eb;
    }

    /* View Toggle */
    .view-toggle {
      display: flex;
      align-items: center;
    }
    .view-toggle__btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
      color: #888;
    }
    .view-toggle__btn:hover {
      border-color: #6366f1;
      color: #6366f1;
      background: #f8f7ff;
    }
    .view-toggle__btn svg {
      width: 20px; height: 20px;
      position: absolute;
      transition: opacity 0.2s, transform 0.2s;
    }
    .view-toggle__btn .icon-grid { opacity: 1; transform: scale(1); }
    .view-toggle__btn .icon-list { opacity: 0; transform: scale(0.7); }
    .view-toggle__btn.list-mode .icon-grid { opacity: 0; transform: scale(0.7); }
    .view-toggle__btn.list-mode .icon-list { opacity: 1; transform: scale(1); }

    /* ========== Portfolio Grid View ========== */
    .portfolio__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }
    .portfolio__grid .portfolio-card {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s;
      cursor: pointer;
    }
    .portfolio__grid .portfolio-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .portfolio__grid .portfolio-card__cover {
      width: 100%; height: 200px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .portfolio__grid .portfolio-card__cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .portfolio__grid .portfolio-card:hover .portfolio-card__cover img {
      transform: scale(1.08);
    }
    .portfolio__grid .portfolio-card__info {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    .portfolio__grid .portfolio-card__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .portfolio__grid .portfolio-card__title {
      font-size: 18px; font-weight: 700; color: #1a1a2e;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .portfolio__grid .portfolio-card__likes {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      font-size: 13px; font-weight: 600; color: #f59e0b;
    }
    .portfolio__grid .portfolio-card__likes .star-icon {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      color: #f59e0b;
    }
    .portfolio__grid .portfolio-card__likes-count {
      font-size: 13px; font-weight: 600; color: #f59e0b;
    }
    .portfolio__grid .portfolio-card__desc {
      font-size: 14px; color: #777; line-height: 1.8;
      margin-bottom: 16px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .portfolio__grid .portfolio-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: auto;
    }
    .portfolio__grid .portfolio-card__tags {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .portfolio__grid .portfolio-card__date {
      font-size: 13px; color: #999;
    }

    /* ========== Portfolio List View ========== */
    .portfolio__list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .portfolio__list .portfolio-card {
      display: flex;
      align-items: stretch;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      transition: all 0.3s;
      cursor: pointer;
    }
    .portfolio__list .portfolio-card:hover {
      transform: translateX(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .portfolio__list .portfolio-card__cover {
      width: 280px; height: 200px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .portfolio__list .portfolio-card__cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .portfolio__list .portfolio-card:hover .portfolio-card__cover img {
      transform: scale(1.08);
    }
    .portfolio__list .portfolio-card__info {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
    }
    .portfolio__list .portfolio-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .portfolio__list .portfolio-card__title {
      font-size: 20px; font-weight: 700; color: #1a1a2e;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .portfolio__list .portfolio-card__likes {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      font-size: 14px; font-weight: 600; color: #f59e0b;
    }
    .portfolio__list .portfolio-card__likes .star-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      color: #f59e0b;
    }
    .portfolio__list .portfolio-card__likes-count {
      font-size: 14px; font-weight: 600; color: #f59e0b;
    }
    .portfolio__list .portfolio-card__desc {
      font-size: 15px; color: #777; line-height: 1.8;
      margin-bottom: 16px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .portfolio__list .portfolio-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: auto;
    }
    .portfolio__list .portfolio-card__tags {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .portfolio__list .portfolio-card__date {
      font-size: 14px; color: #999;
    }

    /* ========== Tag ========== */
    .tag {
      padding: 5px 14px; border-radius: 8px;
      background: #f5f3ff; color: #6366f1;
      font-size: 13px; font-weight: 600;
    }

    /* ========== Empty State ========== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }
    .empty-state__icon {
      font-size: 64px; margin-bottom: 20px;
    }
    .empty-state__text {
      font-size: 18px;
    }

    /* ========== Footer ========== */
    .footer {
      background: #111827; color: #fff;
      padding: 80px 24px 48px;
      text-align: center;
    }
    .footer__logo {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 28px;
      margin-bottom: 28px;
    }
    .footer__slogan {
      font-size: 17px; color: rgba(255,255,255,0.6);
      line-height: 1.9; max-width: 480px; margin: 0 auto;
    }
    .footer__divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 2px; margin: 32px auto;
    }
    .footer__copy {
      font-size: 14px; color: rgba(255,255,255,0.35);
    }

    /* ========== Animations ========== */
    .reveal {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1; transform: translateY(0);
    }

    /* ========== Responsive - Tablet & Mobile ========== */
    @media (max-width: 1100px) {
      .portfolio__grid { grid-template-columns: repeat(2, 1fr); }
      .portfolio__list .portfolio-card__cover { width: 240px; }
    }

    @media (max-width: 900px) {
      .navbar { padding: 0 24px; }
      .navbar__title { font-size: 17px; }
      .nav__menu { display: none; }
      .navbar__hamburger { display: flex; }
      .dropdown-menu { right: 16px; }
      .page-header { padding: 60px 24px 40px; }
      .page-header__title { font-size: 32px; }
      .page-header__desc { font-size: 15px; }
      .portfolio-section { padding: 40px 24px 56px; }
      .filter-bar { padding: 20px; gap: 16px; }
      .filter-bar__left { flex-wrap: wrap; gap: 12px; }
      .sort-btn { padding: 8px 14px; font-size: 13px; }
      .sort-btn .sort-icon { width: 16px; height: 16px; }
      .portfolio__grid { grid-template-columns: 1fr; }
      .portfolio__list .portfolio-card { flex-direction: column; }
      .portfolio__list .portfolio-card__cover { width: 100%; height: 180px; }
    }

    @media (max-width: 480px) {
      .navbar { height: 56px; padding: 0 16px; }
      .navbar__logo-icon { width: 34px; height: 34px; }
      .navbar__title { font-size: 16px; }
      .navbar__hamburger { display: flex; }
      .dropdown-menu { top: 56px; width: 210px; }
      .page-header { margin-top: 56px; padding: 48px 20px 32px; }
      .page-header__title { font-size: 26px; }
      .page-header__tag { font-size: 12px; padding: 4px 14px; }
      .portfolio-section { padding: 32px 16px 48px; }
      .filter-bar { padding: 16px; margin-bottom: 24px; }
      .sort-btn { padding: 6px 12px; font-size: 12px; }
      .portfolio__grid .portfolio-card__cover { height: 160px; }
      .portfolio__grid .portfolio-card__info { padding: 16px; }
      .portfolio__grid .portfolio-card__title { font-size: 16px; }
      .portfolio__list .portfolio-card__cover { height: 160px; }
      .portfolio__list .portfolio-card__info { padding: 20px; }
      .portfolio__list .portfolio-card__title { font-size: 18px; }
      .tag { font-size: 12px; padding: 4px 10px; }
    }
  </style>
</head>

      </a>

      </a>
      <a href="contact.html" class="nav__menu-item">
        <span class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

    <!-- Mobile 汉堡按钮 -->

      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Dropdown Menu -->
  <div class="dropdown-menu" id="dropdownMenu">
    <a href="index.html" class="dropdown-menu__item">
      <span class="menu-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </span>
      首页
    </a>
    <a href="about.html" class="dropdown-menu__item">
      <span class="menu-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      关于我
    </a>
    <a href="portfolio.html" class="dropdown-menu__item active">

  <!-- ========== JavaScript ========== -->
  <script>
    // ========== Data ==========
    const portfolioData = [

      {

        cover: 'images/dt/封面.webp',
        likes: 440,
        rating: 4.4,
        date: '2026-05-14',
        tags: ['墨刀', 'MasterGO']
      },
      {
        id: 1,
        title: '社交新零售',
        desc: '社交新零售是一款聚合社交和商品双重属性的"轻电商"平台，内含丰富的全品类商品，帮助店主零成本打造自己的新零售小店，并获得最高30%的销售返利，购物省钱，分享赚钱的平台。',
        cover: 'images/sjxls/30.webp',
        likes: 480,
        rating: 4.8,
        date: '2026-05-14',
        tags: ['墨刀', 'MasterGO']
      },
      {
        id: 2,
        title: '行家远程工作平台解决方案',
        desc: '行家是全球领先的远程工作交易平台，致力于为全球企业和自由职业者提供数字化的在线工作交易服务。行家远程工作平台通过数字人AI算法，在全球范围内为企业匹配优质的专职远程人才，在线雇佣。包含大多数可以独立完成的工作岗位，如设计、运营、法务、软件、财税、知产等。平台为企业免费提供用人需求发布、人才匹配、视频面试、在线签约、薪资托管、工作台管理、智能考勤、薪酬结算、合规开票、双向评价等远程用工闭环服务。',
        cover: 'images/hj/封面.webp',
        likes: 470,
        rating: 4.7,
        date: '2026-05-14',
        tags: ['墨刀', 'MasterGO']
      },
      {
        id: 3,
        title: '研祥智慧能效监控系统',
        desc: '通过对园区硬件设备进行物联网化的管理和监控，对园区内水、电、空调使用的数据进行实时采集，由原来的人工抄表升级为远程智能抄表，实现数据化、可视化、配置化的监督管理。园区管理员能够实时查看园区内能源的使用情况，收费情况，对相关硬件以及用户进行异常监控预警，从而达到节省企业人力，降低出错率，提高工作效率的目的。',
        cover: 'images/yx/封面.webp',
        likes: 430,
        rating: 4.3,
        date: '2026-05-14',
        tags: ['墨刀', 'MasterGO']
      },
      {
        id: 4,
        title: '代言家企业官网',
        desc: '代言+是一个基于实体异业联盟的社交新零售电商平台，是小程序研发巨头盈客通2019年倾力打造的社交新零售电商平台，刚刚上线就获得数千万的天使轮投资。2019年，是社交新零售的元年，顺应趋势，代言+应运而生。',
        cover: 'images/dyj/封面.webp',
        likes: 420,
        rating: 4.2,
        date: '2026-05-14',
        tags: ['墨刀', 'MasterGO']
      },
      {
        id: 5,
        title: '日常练习',
        desc: '平日的练习，各种类型的都有。',
        cover: 'images/practice/封面.webp',
        likes: 400,
        rating: 4.0,
        date: '2026-05-14',
        tags: ['墨刀', 'MasterGO', 'PhotoShop', 'Illustrator']
      }
    ];

    // ========== State ==========
    let currentSort = { field: 'date', order: 'desc' };
    let currentView = 'grid';

    // ========== DOM Elements ==========
    const hamburger = document.getElementById('hamburger');
    const dropdown = document.getElementById('dropdownMenu');
    const portfolioContainer = document.getElementById('portfolioContainer');
    const sortDateBtn = document.getElementById('sortDate');
    const sortLikesBtn = document.getElementById('sortLikes');

    // ========== Initialize ==========
    document.addEventListener('DOMContentLoaded', () => {
      updateSortUI();
      renderPortfolio();
      initFilters();
      initReveal();
    });

    // ========== Hamburger Menu ==========
    hamburger.addEventListener('click', (e) => {
      e.stopPropagation();
      hamburger.classList.toggle('active');
      dropdown.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target) && !hamburger.contains(e.target)) {
        hamburger.classList.remove('active');
        dropdown.classList.remove('show');
      }
    });

    dropdown.querySelectorAll('.dropdown-menu__item').forEach(item => {
      item.addEventListener('click', () => {
        hamburger.classList.remove('active');
        dropdown.classList.remove('show');
      });
    });

    // ========== Generate Star Icon + Number ==========
    function generateStars(rating, viewType) {
      return `<span class="star-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span><span class="portfolio-card__likes-count">${rating.toFixed(1)}</span>`;
    }

    // ========== Filter & View Toggle ==========
    function initFilters() {
      // Sort by date
      sortDateBtn.addEventListener('click', () => {
        if (currentSort.field === 'date') {
          // Toggle order
          currentSort.order = currentSort.order === 'desc' ? 'asc' : 'desc';
        } else {
          // Switch to date sort
          currentSort.field = 'date';
          currentSort.order = 'desc';
        }
        updateSortUI();
        renderPortfolio();
      });

      // Sort by likes
      sortLikesBtn.addEventListener('click', () => {
        if (currentSort.field === 'likes') {
          // Toggle order
          currentSort.order = currentSort.order === 'desc' ? 'asc' : 'desc';
        } else {
          // Switch to likes sort
          currentSort.field = 'likes';
          currentSort.order = 'desc';
        }
        updateSortUI();
        renderPortfolio();
      });

      // View toggle (single button)
      const viewToggleBtn = document.getElementById('viewToggleBtn');
      viewToggleBtn.addEventListener('click', () => {
        currentView = currentView === 'grid' ? 'list' : 'grid';
        if (currentView === 'list') {
          viewToggleBtn.classList.add('list-mode');
          viewToggleBtn.title = '切换为宫格视图';
        } else {
          viewToggleBtn.classList.remove('list-mode');
          viewToggleBtn.title = '切换为列表视图';
        }
        renderPortfolio();
      });
    }

    // ========== Update Sort UI ==========
    function updateSortUI() {
      // Reset all buttons
      sortDateBtn.classList.remove('active');
      sortLikesBtn.classList.remove('active');

      // Reset all arrows to inactive (gray)
      document.querySelectorAll('.sort-arrows svg').forEach(svg => {
        svg.classList.remove('active-arrow');
      });

      // Set active button and arrow direction
      if (currentSort.field === 'date') {
        sortDateBtn.classList.add('active');
        // desc: down arrow active; asc: up arrow active
        const upArrow = sortDateBtn.querySelector('.arrow-up');
        const downArrow = sortDateBtn.querySelector('.arrow-down');
        if (currentSort.order === 'desc') {
          downArrow.classList.add('active-arrow');
        } else {
          upArrow.classList.add('active-arrow');
        }
      } else {
        sortLikesBtn.classList.add('active');
        const upArrow = sortLikesBtn.querySelector('.arrow-up');
        const downArrow = sortLikesBtn.querySelector('.arrow-down');
        if (currentSort.order === 'desc') {
          downArrow.classList.add('active-arrow');
        } else {
          upArrow.classList.add('active-arrow');
        }
      }
    }

    // ========== Render Portfolio ==========
    function renderPortfolio() {
      // Sort data
      const sorted = [...portfolioData].sort((a, b) => {
        if (currentSort.field === 'date') {
          const dateA = new Date(a.date);
          const dateB = new Date(b.date);
          return currentSort.order === 'desc' ? dateB - dateA : dateA - dateB;
        } else {
          return currentSort.order === 'desc' ? b.likes - a.likes : a.likes - b.likes;
        }
      });

      // Format date
      const formatDate = (dateStr) => {
        const date = new Date(dateStr);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}.${month}.${day}`;
      };

      // Generate HTML
      const cardsHTML = sorted.map((item, index) => `
        <article class="portfolio-card reveal" style="animation-delay: ${index * 80}ms" data-id="${item.id}">
          <div class="portfolio-card__cover">
            <img src="${item.cover}" alt="${item.title}">
          </div>
          <div class="portfolio-card__info">
            <div class="portfolio-card__header">
              <h3 class="portfolio-card__title">${item.title}</h3>
              <div class="portfolio-card__likes">
                ${generateStars(item.rating, currentView)}
              </div>
            </div>
            <p class="portfolio-card__desc">${item.desc}</p>
            <div class="portfolio-card__footer">
              <div class="portfolio-card__tags">
                ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
              </div>
              <span class="portfolio-card__date">${formatDate(item.date)}</span>
            </div>
          </div>
        </article>
      `).join('');

      // Update container
      portfolioContainer.className = currentView === 'grid' ? 'portfolio__grid' : 'portfolio__list';
      portfolioContainer.innerHTML = cardsHTML;

      // Re-init reveal animation
      setTimeout(() => {
        initReveal();
        initCardClickHandlers();
      }, 50);
    }

    // ========== Card Click Handlers ==========
    function initCardClickHandlers() {
      document.querySelectorAll('.portfolio-card').forEach(card => {
        card.addEventListener('click', () => {
          const workId = card.dataset.id;
          window.location.href = `work-detail.html?id=${workId}`;
        });
      });
    }

    // ========== Reveal Animation ==========
    function initReveal() {
      const revealElements = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      revealElements.forEach(el => observer.observe(el));
    }

    // ========== Navbar Shadow ==========
    const navbar = document.querySelector('.navbar');
    window.addEventListener('scroll', () => {
      navbar.style.boxShadow = window.scrollY > 20
        ? '0 2px 20px rgba(0,0,0,0.08)'
        : '0 1px 0 rgba(0,0,0,0.06)';
    });
  </script>
