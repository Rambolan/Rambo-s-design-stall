<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 - 兰博的设计小摊</title>
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #333;
      background: #f0f2f5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* ========== Top Navigation ========== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    }
    .navbar__logo {
      display: flex; align-items: center; gap: 12px;
      font-weight: 700; font-size: 20px; color: #111;
    }
    .navbar__logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      overflow: hidden;
    }
    .navbar__logo-icon img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .navbar__title {
      font-size: 20px; font-weight: 700; color: #1a1a2e;
      letter-spacing: 0.5px;
    }

    /* ========== PC Nav Menu (Horizontal) ========== */
    .nav__menu {
      display: flex; align-items: center; gap: 8px;
    }
    .nav__menu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 15px; font-weight: 500; color: #555;
      transition: all 0.2s;
      cursor: pointer;
    }
    .nav__menu-item:hover {
      background: #f3f0ff;
      color: #6366f1;
    }
    .nav__menu-item.active {
      background: #f3f0ff;
      color: #6366f1;
    }
    .nav__menu-item .menu-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      color: #6366f1;
    }

    /* ========== Mobile Hamburger (hidden on PC) ========== */
    .navbar__hamburger {
      display: none;
      width: 44px; height: 44px; border: none; background: none;
      cursor: pointer; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      border-radius: 12px; transition: background 0.2s;
    }
    .navbar__hamburger:hover { background: #f0f0f5; }
    .navbar__hamburger span {
      display: block; width: 24px; height: 2.5px;
      background: #333; border-radius: 2px;
      transition: all 0.3s ease;
    }
    .navbar__hamburger.active span:nth-child(1) {
      transform: translateY(8.5px) rotate(45deg);
    }
    .navbar__hamburger.active span:nth-child(2) { opacity: 0; }
    .navbar__hamburger.active span:nth-child(3) {
      transform: translateY(-8.5px) rotate(-45deg);
    }

    /* ========== Dropdown Menu ========== */
    .dropdown-menu {
      position: fixed; top: 68px; right: 40px; z-index: 999;
      width: 240px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
      padding: 10px;
      opacity: 0; visibility: hidden;
      transform: translateY(-12px) scale(0.96);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .dropdown-menu.show {
      opacity: 1; visibility: visible; transform: translateY(0) scale(1);
    }
    .dropdown-menu__item {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 18px;
      border-radius: 12px;
      font-size: 16px; color: #333; font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }
    .dropdown-menu__item:hover { background: #f3f0ff; color: #6366f1; }
    .dropdown-menu__item.active { background: #f3f0ff; color: #6366f1; }
    .dropdown-menu__item .menu-icon {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      color: #6366f1;
    }

    /* ========== Page Header ========== */
    .page-header {
      margin-top: 68px;
      padding: 80px 48px 60px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      text-align: center;
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 15% 75%, rgba(99,102,241,0.18) 0%, transparent 50%),
        radial-gradient(circle at 85% 15%, rgba(168,85,247,0.12) 0%, transparent 50%);
    }
    .page-header__content {
      position: relative; z-index: 1;
      max-width: 800px; margin: 0 auto;
    }
    .page-header__tag {
      display: inline-block;
      padding: 6px 18px; border-radius: 24px;
      background: rgba(99,102,241,0.2); color: #a5b4fc;
      font-size: 14px; font-weight: 700; margin-bottom: 16px;
      letter-spacing: 2px;
    }
    .page-header__title {
      font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 16px;
    }
    .page-header__desc {
      font-size: 17px; color: rgba(255,255,255,0.78); line-height: 1.8;
    }

    /* ========== Article Section ========== */
    .article-section {
      padding: 60px 48px 80px;
      max-width: 1280px; margin: 0 auto;
    }

    /* ========== Filter Bar ========== */
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
      padding: 24px 32px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    .filter-bar__left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .sort-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sort-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      border-radius: 12px;
      font-size: 14px; font-weight: 500; color: #555;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    .sort-btn:hover {
      border-color: #6366f1;
      color: #6366f1;
      background: #f8f7ff;
    }
    .sort-btn.active {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-color: transparent;
      color: #fff;
    }
    .sort-btn.active .sort-icon {
      color: #fff;
    }
    .sort-btn .sort-text {
      white-space: nowrap;
    }
    .sort-arrows {
      display: flex;
      flex-direction: column;
      line-height: 1;
      margin-left: 6px;
    }
    .sort-arrows svg {
      width: 14px; height: 10px;
      color: #bbb;
      transition: color 0.2s;
    }
    .sort-arrows svg.active-arrow {
      color: #555;
    }
    .sort-btn:hover .sort-arrows svg.active-arrow {
      color: #6366f1;
    }
    .sort-btn.active .sort-arrows svg {
      color: rgba(255,255,255,0.45);
    }
    .sort-btn.active .sort-arrows svg.active-arrow {
      color: #fff;
    }
    .sort-divider {
      width: 1px; height: 32px;
      background: #e5e7eb;
    }

    /* View Toggle */
    .view-toggle {
      display: flex;
      align-items: center;
    }
    .view-toggle__btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
      color: #888;
    }
    .view-toggle__btn:hover {
      border-color: #6366f1;
      color: #6366f1;
      background: #f8f7ff;
    }
    .view-toggle__btn svg {
      width: 20px; height: 20px;
      position: absolute;
      transition: opacity 0.2s, transform 0.2s;
    }
    .view-toggle__btn .icon-grid { opacity: 1; transform: scale(1); }
    .view-toggle__btn .icon-list { opacity: 0; transform: scale(0.7); }
    .view-toggle__btn.list-mode .icon-grid { opacity: 0; transform: scale(0.7); }
    .view-toggle__btn.list-mode .icon-list { opacity: 1; transform: scale(1); }

    /* ========== Article Grid View ========== */
    .article__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }
    .article__grid .article-card {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s;
      cursor: pointer;
    }
    .article__grid .article-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .article__grid .article-card__cover {
      width: 100%; height: 180px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .article__grid .article-card__cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .article__grid .article-card:hover .article-card__cover img {
      transform: scale(1.08);
    }
    .article__grid .article-card__info {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    .article__grid .article-card__title {
      font-size: 18px; font-weight: 700; color: #1a1a2e;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article__grid .article-card__desc {
      font-size: 14px; color: #777; line-height: 1.8;
      margin-bottom: 16px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article__grid .article-card__date {
      font-size: 13px; color: #999;
    }

    /* ========== Article List View ========== */
    .article__list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .article__list .article-card {
      display: flex;
      align-items: stretch;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      transition: all 0.3s;
      cursor: pointer;
    }
    .article__list .article-card:hover {
      transform: translateX(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .article__list .article-card__cover {
      width: 280px; height: 180px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .article__list .article-card__cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .article__list .article-card:hover .article-card__cover img {
      transform: scale(1.08);
    }
    .article__list .article-card__info {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
    }
    .article__list .article-card__title {
      font-size: 20px; font-weight: 700; color: #1a1a2e;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article__list .article-card__desc {
      font-size: 15px; color: #777; line-height: 1.8;
      margin-bottom: 16px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article__list .article-card__date {
      font-size: 14px; color: #999;
    }

    /* ========== Empty State ========== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }
    .empty-state__icon {
      font-size: 64px; margin-bottom: 20px;
    }
    .empty-state__text {
      font-size: 18px;
    }

    /* ========== Footer ========== */
    .footer {
      background: #111827; color: #fff;
      padding: 80px 24px 48px;
      text-align: center;
    }
    .footer__logo {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 28px;
      margin-bottom: 28px;
    }
    .footer__slogan {
      font-size: 17px; color: rgba(255,255,255,0.6);
      line-height: 1.9; max-width: 480px; margin: 0 auto;
    }
    .footer__divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 2px; margin: 32px auto;
    }
    .footer__copy {
      font-size: 14px; color: rgba(255,255,255,0.35);
    }

    /* ========== Animations ========== */
    .reveal {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1; transform: translateY(0);
    }

    /* ========== Responsive - Tablet & Mobile ========== */
    @media (max-width: 1100px) {
      .article__grid { grid-template-columns: repeat(2, 1fr); }
      .article__list .article-card__cover { width: 240px; }
    }

    @media (max-width: 900px) {
      .navbar { padding: 0 24px; }
      .navbar__title { font-size: 17px; }
      .nav__menu { display: none; }
      .navbar__hamburger { display: flex; }
      .dropdown-menu { right: 16px; }
      .page-header { padding: 60px 24px 40px; }
      .page-header__title { font-size: 32px; }
      .page-header__desc { font-size: 15px; }
      .article-section { padding: 40px 24px 56px; }
      .filter-bar { padding: 20px; gap: 16px; }
      .filter-bar__left { flex-wrap: wrap; gap: 12px; }
      .sort-btn { padding: 8px 14px; font-size: 13px; }
      .sort-btn .sort-icon { width: 16px; height: 16px; }
      .article__grid { grid-template-columns: 1fr; }
      .article__list .article-card { flex-direction: column; }
      .article__list .article-card__cover { width: 100%; height: 180px; }
    }

    @media (max-width: 480px) {
      .navbar { height: 56px; padding: 0 16px; }
      .navbar__logo-icon { width: 34px; height: 34px; }
      .navbar__title { font-size: 16px; }
      .navbar__hamburger { display: flex; }
      .dropdown-menu { top: 56px; width: 210px; }
      .page-header { margin-top: 56px; padding: 48px 20px 32px; }
      .page-header__title { font-size: 26px; }
      .page-header__tag { font-size: 12px; padding: 4px 14px; }
      .article-section { padding: 32px 16px 48px; }
      .filter-bar { padding: 16px; margin-bottom: 24px; }
      .sort-btn { padding: 6px 12px; font-size: 12px; }
      .article__grid .article-card__cover { height: 160px; }
      .article__grid .article-card__info { padding: 16px; }
      .article__grid .article-card__title { font-size: 16px; }
      .article__list .article-card__cover { height: 160px; }
      .article__list .article-card__info { padding: 20px; }
      .article__list .article-card__title { font-size: 18px; }
    }
  </style>
</head>

      <div class="view-toggle">
        <button class="view-toggle__btn" id="viewToggleBtn" title="切换视图">
          <!-- 宫格图标（默认显示） -->
          <svg class="icon-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          <!-- 列表图标（切换后显示） -->
          <svg class="icon-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Article Container -->
    <div id="articleContainer" class="article__grid">
      <!-- Cards will be injected by JavaScript -->
    </div>
  </section>

  <!-- ========== Footer ========== -->
  <footer class="footer">
    <div class="footer__logo">
      <img src="images/logo-white@1x.png" alt="Logo">
    </div>
    <p class="footer__slogan">
      专注于用户体验设计与前端开发的独立设计师，<br/>致力于创造有价值的数字产品。
    </p>
    <div class="footer__divider"></div>
    <p class="footer__copy">© 2026 兰博的设计小摊 · All Rights Reserved</p>
  </footer>

  <!-- ========== JavaScript ========== -->
  <script>
    // ========== Data ==========
    const articleData = [
      {
        id: 9,
        title: '用 AI 开发个人网站——从创意到上线的完整实录',
        desc: '记录使用 AI 助手从零开始开发个人作品集网站的完整过程，包括需求确定、细节调整、链接检查、Logo 替换和部署上线。',
        cover: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=600&h=400&fit=crop',
        date: '2026-05-12'
      },
      {
        id: 1,
        title: '用户体验设计的核心原则与实践',
        desc: '深入探讨 UX 设计中的五大核心原则，从用户研究到原型测试，分享如何打造真正以用户为中心的产品体验。',
        cover: 'https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=600&h=400&fit=crop',
        date: '2026-05-08'
      },
      {
        id: 2,
        title: '响应式设计的最佳实践指南',
        desc: '从移动优先到桌面端适配，详解现代响应式设计的技术方案与布局策略，帮助设计师和开发者更好地协作。',
        cover: 'https://images.unsplash.com/photo-1507721999472-8ed4421c4af2?w=600&h=400&fit=crop',
        date: '2026-04-25'
      },
      {
        id: 3,
        title: '设计系统：从零到一的构建之路',
        desc: '分享如何建立一套可扩展的设计系统，包括色彩、字体、组件库的管理与文档化，提升团队协作效率。',
        cover: 'https://images.unsplash.com/photo-1558655146-9f40138edfeb?w=600&h=400&fit=crop',
        date: '2026-04-12'
      },
      {
        id: 4,
        title: '动效设计：让界面更生动',
        desc: '探讨 UI 动效设计的底层逻辑与实现技巧，从微交互到页面转场，学习如何用动效提升用户体验。',
        cover: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600&h=400&fit=crop',
        date: '2026-03-28'
      },
      {
        id: 5,
        title: '设计中的色彩心理学应用',
        desc: '解读色彩对用户情绪和行为的影响，分享如何科学地选择配色方案，打造有感染力的品牌视觉。',
        cover: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=600&h=400&fit=crop',
        date: '2026-03-15'
      },
      {
        id: 6,
        title: 'AI 时代的设计师该何去何从',
        desc: '面对 AI 工具的崛起，设计师如何保持竞争力？从技能升级到思维方式转变，探讨设计师的未来方向。',
        cover: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=600&h=400&fit=crop',
        date: '2026-02-28'
      },
      {
        id: 7,
        title: '设计师的代码素养：为何要学前端',
        desc: '设计师学习基础的 HTML/CSS/JavaScript 能带来哪些好处？如何打破设计与开发的壁垒，实现高效协作。',
        cover: 'https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=600&h=400&fit=crop',
        date: '2026-02-10'
      },
      {
        id: 8,
        title: '从 Figma 到生产：设计交接的避坑指南',
        desc: '设计师如何交付高质量的设计稿给开发团队？从标注规范到设计交接文档，建立顺畅的设计开发流程。',
        cover: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=600&h=400&fit=crop',
        date: '2026-01-22'
      }
    ];

    // ========== State ==========
    let currentSort = { field: 'date', order: 'desc' };
    let currentView = 'grid';

    // ========== DOM Elements ==========
    const hamburger = document.getElementById('hamburger');
    const dropdown = document.getElementById('dropdownMenu');
    const articleContainer = document.getElementById('articleContainer');
    const sortDateBtn = document.getElementById('sortDate');

    // ========== Initialize ==========
    document.addEventListener('DOMContentLoaded', () => {
      updateSortUI();
      renderArticles();
      initFilters();
      initReveal();
    });

    // ========== Hamburger Menu ==========
    hamburger.addEventListener('click', (e) => {
      e.stopPropagation();
      hamburger.classList.toggle('active');
      dropdown.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target) && !hamburger.contains(e.target)) {
        hamburger.classList.remove('active');
        dropdown.classList.remove('show');
      }
    });

    dropdown.querySelectorAll('.dropdown-menu__item').forEach(item => {
      item.addEventListener('click', () => {
        hamburger.classList.remove('active');
        dropdown.classList.remove('show');
      });
    });

    // ========== Filter & View Toggle ==========
    function initFilters() {
      // Sort by date
      sortDateBtn.addEventListener('click', () => {
        if (currentSort.field === 'date') {
          // Toggle order
          currentSort.order = currentSort.order === 'desc' ? 'asc' : 'desc';
        } else {
          // Switch to date sort
          currentSort.field = 'date';
          currentSort.order = 'desc';
        }
        updateSortUI();
        renderArticles();
      });

      // View toggle (single button)
      const viewToggleBtn = document.getElementById('viewToggleBtn');
      viewToggleBtn.addEventListener('click', () => {
        currentView = currentView === 'grid' ? 'list' : 'grid';
        if (currentView === 'list') {
          viewToggleBtn.classList.add('list-mode');
          viewToggleBtn.title = '切换为宫格视图';
        } else {
          viewToggleBtn.classList.remove('list-mode');
          viewToggleBtn.title = '切换为列表视图';
        }
        renderArticles();
      });
    }

    // ========== Update Sort UI ==========
    function updateSortUI() {
      // Reset all buttons
      sortDateBtn.classList.remove('active');

      // Reset all arrows to inactive (gray)
      document.querySelectorAll('.sort-arrows svg').forEach(svg => {
        svg.classList.remove('active-arrow');
      });

      // Set active button and arrow direction
      sortDateBtn.classList.add('active');
      // desc: down arrow active; asc: up arrow active
      const upArrow = sortDateBtn.querySelector('.arrow-up');
      const downArrow = sortDateBtn.querySelector('.arrow-down');
      if (currentSort.order === 'desc') {
        downArrow.classList.add('active-arrow');
      } else {
        upArrow.classList.add('active-arrow');
      }
    }

    // ========== Render Articles ==========
    function renderArticles() {
      // Sort data
      const sorted = [...articleData].sort((a, b) => {
        const dateA = new Date(a.date);
        const dateB = new Date(b.date);
        return currentSort.order === 'desc' ? dateB - dateA : dateA - dateB;
      });

      // Format date
      const formatDate = (dateStr) => {
        const date = new Date(dateStr);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}.${month}.${day}`;
      };

      // Generate HTML
      const cardsHTML = sorted.map((item, index) => `
        <article class="article-card reveal" style="animation-delay: ${index * 80}ms" data-id="${item.id}">
          <div class="article-card__cover">
            <img src="${item.cover}" alt="${item.title}">
          </div>
          <div class="article-card__info">
            <h3 class="article-card__title">${item.title}</h3>
            <p class="article-card__desc">${item.desc}</p>
            <span class="article-card__date">${formatDate(item.date)}</span>
          </div>
        </article>
      `).join('');

      // Update container
      articleContainer.className = currentView === 'grid' ? 'article__grid' : 'article__list';
      articleContainer.innerHTML = cardsHTML;

      // Re-init reveal animation
      setTimeout(() => {
        initReveal();
        initCardClickHandlers();
      }, 50);
    }

    // ========== Card Click Handlers ==========
    function initCardClickHandlers() {
      document.querySelectorAll('.article-card').forEach(card => {
        card.addEventListener('click', () => {
          const articleId = card.dataset.id;
          window.location.href = `article-detail.html?id=${articleId}`;
        });
      });
    }

    // ========== Reveal Animation ==========
    function initReveal() {
      const revealElements = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      revealElements.forEach(el => observer.observe(el));
    }

    // ========== Navbar Shadow ==========
    const navbar = document.querySelector('.navbar');
    window.addEventListener('scroll', () => {
      navbar.style.boxShadow = window.scrollY > 20
        ? '0 2px 20px rgba(0,0,0,0.08)'
        : '0 1px 0 rgba(0,0,0,0.06)';
    });
  </script>
</body>
